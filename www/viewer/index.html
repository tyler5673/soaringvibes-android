<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Viewer - Soaring Vibes</title>
    <base href="/viewer/">
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="top-bar">
            <div class="logo">Asset Viewer</div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search...">
            </div>
            <div class="filter-box">
                <select id="category-filter">
                    <option value="all">All</option>
                    <option value="aircraft">Aircraft</option>
                    <option value="trees">Trees</option>
                    <option value="animals">Animals</option>
                    <option value="vehicles">Vehicles</option>
                    <option value="effects">Effects</option>
                </select>
            </div>
        </header>
        
        <!-- Main content -->
        <div id="main-content">
            <!-- Model list sidebar -->
            <aside id="sidebar">
                <div class="sidebar-header">Models</div>
                <div id="model-list"></div>
            </aside>
            
            <!-- 3D Viewer -->
            <main id="viewer-container">
                <canvas id="webgl-canvas"></canvas>
            </main>
        </div>
        
        <!-- Footer with info -->
        <footer id="info-bar">
            <div class="model-info">
                <span id="model-name">Select a model</span>
                <span id="model-category"></span>
            </div>
            <div class="stats">
                <span id="model-stats"></span>
            </div>
            <div class="controls">
                <button id="play-btn">Play</button>
                <button id="pause-btn">Pause</button>
                <label>Speed: <input type="range" id="speed-slider" min="0" max="3" step="0.1" value="1"></label>
            </div>
        </footer>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="viewer.mjs"></script>
</body>
</html>
